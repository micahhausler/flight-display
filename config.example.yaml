## Data source: "opensky" or "adsb"
# source: opensky

observer:
  lat: 47.6115
  lon: -122.3470
  alt_msl_meters: 55

aperture:
  rects:
    # Main window view: south through west
    - az_min: 160
      az_max: 290
      el_min: -2
      el_max: 30
    # Narrower view toward northwest
    - az_min: 290
      az_max: 330
      el_min: 0
      el_max: 15

poll_interval: 30s
sighting_ttl: 60s
max_range_km: 60  # ~35 miles, reasonable naked-eye limit for commercial jets
min_alt_ft: 150   # suppress aircraft at/near ground level
min_speed_kt: 50  # suppress taxiing aircraft reporting as airborne
commercial_only: false  # true to show only airline callsigns (filters GA N-numbers)

# routes_dir: data/routes

## OpenSky Network credentials (used when source: opensky)
opensky:
  client_id: ""
  client_secret: ""

## ADS-B receiver settings (used when source: adsb)
## Queries the readsb HTTP API
# adsb:
#   url: http://localhost:8080/?all

## AeroAPI route lookup (FlightAware)
## When configured, routes are looked up via AeroAPI instead of the VRS database.
## Get an API key at https://flightaware.com/aeroapi/
# aeroapi:
#   key: "your-api-key-here"
#   cache_path: ~/.cache/flight-display/routes.json  # defaults to this
